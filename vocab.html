<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Vocab Bundles</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2336;
    --accent: #c9a84c;
    --accent2: #7eb8a4;
    --text: #e8e4d9;
    --muted: #8a8fa8;
    --border: #2a304a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0f1117 0%, #1a1f35 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .subtitle { color: var(--muted); font-size: 0.85rem; font-weight: 300; }

  /* BUNDLE TABS */
  .bundle-nav {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .bundle-tab {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.76rem;
    font-weight: 500;
    padding: 5px 14px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .bundle-tab:hover { border-color: var(--accent); color: var(--text); }
  .bundle-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f1117;
    font-weight: 700;
  }

  /* MAIN */
  main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  .bundle-header {
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bundle-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--text);
  }
  .bundle-title span {
    font-style: italic;
    color: var(--accent);
  }
  .bundle-desc {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
    font-weight: 300;
    max-width: 600px;
  }
  .word-count {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 6px 14px;
    white-space: nowrap;
  }

  /* WORD GRID */
  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  /* FLIP CARD */
  .flip-card {
    perspective: 1000px;
    height: 140px;
    cursor: pointer;
  }
  .flip-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 12px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .flip-front {
    background: var(--card);
  }
  .flip-back {
    background: #1a2438;
    border-color: var(--accent2);
    transform: rotateY(180deg);
  }

  .word-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--text);
    line-height: 1.1;
  }
  .word-pos {
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 4px;
  }
  .flip-hint {
    font-size: 0.7rem;
    color: var(--muted);
    opacity: 0.6;
    align-self: flex-end;
  }

  .word-def {
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.45;
    font-weight: 300;
  }
  .word-ex {
    font-size: 0.72rem;
    color: var(--accent2);
    font-style: italic;
    line-height: 1.35;
  }

  /* CONNOTATION BADGE */
  .tone-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 4px;
    align-self: flex-start;
  }
  .tone-neg { background: #3a1a1a; color: #e88; }
  .tone-pos { background: #1a3a1a; color: #8e8; }
  .tone-neu { background: #2a2a1a; color: #cc8; }

  /* PROGRESS BAR */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .bundle-section { display: none; }
  .bundle-section.active { display: block; }

  @media (max-width: 600px) {
    header { padding: 20px 16px 16px; }
    main { padding: 20px 14px; }
    h1 { font-size: 1.4rem; }
    .bundle-title { font-size: 1.2rem; }
    .word-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .flip-card { height: 130px; }
  }
</style>
</head>

// Build navigation
const nav = document.getElementById('bundleNav');
const container = document.getElementById('bundleContainer');

bundles.forEach((bundle, idx) => {
  // Tab
  const tab = document.createElement('button');
  tab.className = 'bundle-tab' + (idx === 0 ? ' active' : '');
  tab.textContent = `${bundle.emoji} ${bundle.name}`;
  tab.onclick = () => switchBundle(idx);
  nav.appendChild(tab);

  // Section
  const section = document.createElement('div');
  section.className = 'bundle-section' + (idx === 0 ? ' active' : '');
  section.id = `bundle-${idx}`;

  section.innerHTML = `
    <div class="bundle-header">
      <div>
        <div class="bundle-title">${bundle.emoji} <span>${bundle.name}</span></div>
        <div class="bundle-desc">${bundle.desc}</div>
        <div class="progress-bar" style="margin-top:10px; width:200px;">
          <div class="progress-fill" id="progress-${idx}" style="width:0%"></div>
        </div>
      </div>
      <div class="word-count">${bundle.words.length} words</div>
    </div>
    <div class="word-grid" id="grid-${idx}"></div>
  `;

  container.appendChild(section);

  const grid = section.querySelector(`#grid-${idx}`);
  bundle.words.forEach((word, wIdx) => {
    const card = document.createElement('div');
    card.className = 'flip-card';
    card.innerHTML = `
      <div class="flip-inner">
        <div class="flip-front">
          <div>
            <div class="word-name">${word.w}</div>
            <div class="word-pos">${word.pos}</div>
            <span class="tone-badge tone-${word.tone}">${word.tone === 'pos' ? '+ positive' : word.tone === 'neg' ? '− negative' : '○ neutral'}</span>
          </div>
          <div class="flip-hint">tap to reveal ↗</div>
        </div>
        <div class="flip-back">
          <div class="word-def">${word.def}</div>
          <div class="word-ex">"${word.ex}"</div>
        </div>
      </div>
    `;
    card.onclick = () => {
      card.classList.toggle('flipped');
      updateProgress(idx);
    };
    grid.appendChild(card);
  });
});

function switchBundle(idx) {
  document.querySelectorAll('.bundle-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.bundle-section').forEach((s, i) => {
    s.classList.toggle('active', i === idx);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress(bundleIdx) {
  const grid = document.getElementById(`grid-${bundleIdx}`);
  const cards = grid.querySelectorAll('.flip-card');
  const flipped = grid.querySelectorAll('.flip-card.flipped').length;
  const pct = Math.round((flipped / cards.length) * 100);
  document.getElementById(`progress-${bundleIdx}`).style.width = pct + '%';
}
</script>
